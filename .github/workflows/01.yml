name: First Work flow
on: workflow_dispatch

jobs:
  first_job:
    runs-on: ubuntu-latest
    env:
     TF_IN_AUTOMATION: true
     TF_INPUT: false
     TF_VAR_jamf_url: ${{ secrets.TF_VAR_JAMFPRO_INSTANCE_FQDN }}
     TF_VAR_jamf_username: ${{ secrets.TF_VAR_JAMFPRO_BASIC_AUTH_USERNAME }}
     TF_VAR_jamf_password: ${{ secrets.TF_VAR_JAMFPRO_BASIC_AUTH_PASSWORD }}
     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: First step
        uses: actions/checkout@v4
      - name: Second step
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.4
      - name: Third step
        run: terraform fmt
      - name: Fifth step
        run: terraform init